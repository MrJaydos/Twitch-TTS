# Local / self-hosted compose. Piper TTS is bundled inside the app image, so the
# only services are the app and a Postgres for local use. On platforms that only
# run a single service (e.g. Coolify treating this as a Dockerfile app), just run
# the app image and provide DATABASE_URL for a managed/separate Postgres.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # ── Required ──
      PUBLIC_URL: ${PUBLIC_URL}
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      # ── Database ──
      # Set DATABASE_URL to use a managed/separate Postgres. If unset, the app
      # derives one from the bundled ttsdb service below.
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_HOST: ttsdb
      POSTGRES_USER: tts
      POSTGRES_DB: tts
      # ── Bundled Piper (runs on 127.0.0.1:5000 inside the container) ──
      PIPER_URL: http://127.0.0.1:5000
      PIPER_DATA_DIR: /data/piper-voices
      DEFAULT_VOICE: en_US-amy-medium
      PIPER_VOICES: en_US-amy-medium,en_US-ryan-high,en_GB-alba-medium
      # ── Misc ──
      PORT: "3000"
      AUDIO_CACHE_DIR: /data/audio-cache
      AUDIO_TTL_SECONDS: "900"
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      # Holds Piper voices + generated audio; persist to keep voices between deploys.
      - appdata:/data
    depends_on:
      ttsdb:
        condition: service_healthy

  # Bundled Postgres for local/standalone use. Not needed if you set DATABASE_URL
  # to a managed database. Trust auth on the internal-only network.
  ttsdb:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tts
      POSTGRES_DB: tts
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgdata3:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tts"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  appdata:
  pgdata3:
