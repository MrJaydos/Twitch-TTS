services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # ── Required: set these in Coolify's Environment Variables UI ──
      PUBLIC_URL: ${PUBLIC_URL}
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      # ── Internal wiring — Postgres has NO exposed ports, so this fixed
      #    internal password is only reachable inside the compose network.
      #    The app derives DATABASE_URL from these at boot. Both the app and
      #    the postgres service MUST use the same POSTGRES_PASSWORD literal.
      PORT: "3000"
      POSTGRES_HOST: postgres
      POSTGRES_USER: tts
      POSTGRES_DB: tts
      POSTGRES_PASSWORD: tts_internal_pw
      PIPER_URL: http://piper:5000
      DEFAULT_VOICE: en_US-amy-medium
      PIPER_VOICES: en_US-amy-medium,en_US-ryan-high,en_GB-alba-medium
      AUDIO_CACHE_DIR: /data/audio-cache
      AUDIO_TTL_SECONDS: "900"
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - audio-cache:/data/audio-cache
    depends_on:
      postgres:
        condition: service_healthy
      piper:
        condition: service_started

  piper:
    build:
      context: ./docker/piper
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      DEFAULT_VOICE: en_US-amy-medium
      PIPER_VOICES: en_US-amy-medium,en_US-ryan-high,en_GB-alba-medium
    volumes:
      - piper-voices:/data

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tts
      POSTGRES_PASSWORD: tts_internal_pw
      POSTGRES_DB: tts
    volumes:
      - pgdata2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tts"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  audio-cache:
  piper-voices:
  pgdata2:
