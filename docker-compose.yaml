services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # ── Required: set these in Coolify's Environment Variables UI ──
      PUBLIC_URL: ${PUBLIC_URL}
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      # ── Internal wiring — the DB service (ttsdb) has NO exposed ports and
      #    uses trust auth, so the password below is not actually checked.
      #    The app derives DATABASE_URL from these values at boot.
      PORT: "3000"
      POSTGRES_HOST: ttsdb
      POSTGRES_USER: tts
      POSTGRES_DB: tts
      POSTGRES_PASSWORD: tts_internal_pw
      PIPER_URL: http://piper:5000
      DEFAULT_VOICE: en_US-amy-medium
      PIPER_VOICES: en_US-amy-medium,en_US-ryan-high,en_GB-alba-medium
      AUDIO_CACHE_DIR: /data/audio-cache
      AUDIO_TTL_SECONDS: "900"
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - audio-cache:/data/audio-cache
    depends_on:
      ttsdb:
        condition: service_healthy
      piper:
        condition: service_started

  piper:
    build:
      context: ./docker/piper
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      DEFAULT_VOICE: en_US-amy-medium
      PIPER_VOICES: en_US-amy-medium,en_US-ryan-high,en_GB-alba-medium
    volumes:
      - piper-voices:/data

  # Named 'ttsdb' (not 'postgres') so the app never resolves to a stale
  # orphaned postgres container left behind by earlier deploys.
  ttsdb:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tts
      POSTGRES_DB: tts
      # No exposed ports — only reachable by the app over the internal compose
      # network. Trust auth accepts the connection regardless of the password
      # the app sends, sidestepping platform env-injection mismatches entirely.
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgdata3:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tts"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  audio-cache:
  piper-voices:
  pgdata3:
